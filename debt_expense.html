<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F0EEFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="manifest" href="manifest.json">
  <title>បំណុល</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="back-btn" id="backBtn" aria-label="ត្រឡប់ក្រោយ"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="page page-sub active">
    <div class="container">
      <div class="sub-grid">
        <div class="sub-card selected" tabindex="0" data-value="family_debt">
          <span class="sub-card-check"><i class="fa-solid fa-check"></i></span>
          <div class="sub-card-image">
            <img loading="lazy" src="images/debt_expense/debt_family.jpg" alt="">
          </div>
          <div class="sub-card-title">បំណុលសាច់ញាតិ</div>
          <div class="sub-card-examples">បំណុលដែលត្រូវសងទៅសាច់ញាតិ</div>
        </div>
        <div class="sub-card" tabindex="0" data-value="personal_debt">
          <span class="sub-card-check"><i class="fa-solid fa-check"></i></span>
          <div class="sub-card-image">
            <img loading="lazy" src="images/debt_expense/debt_personal.jpg" alt="">
          </div>
          <div class="sub-card-title">បំណុលផ្ទាល់ខ្លួន</div>
          <div class="sub-card-examples">បំណុលដែលត្រូវសងទៅមិត្តភក្តិ ឬគ្រឹះស្ថានហិរញ្ញវត្ថុ</div>
        </div>
        <div class="sub-card" tabindex="0" data-value="business_debt">
          <span class="sub-card-check"><i class="fa-solid fa-check"></i></span>
          <div class="sub-card-image">
            <img loading="lazy" src="images/debt_expense/debt_business.jpg" alt="">
          </div>
          <div class="sub-card-title">បំណុលអាជីវកម្ម</div>
          <div class="sub-card-examples">បំណុលដែលត្រូវសងទៅធនាគារ ឬដៃគូអាជីវកម្ម</div>
        </div>
      </div>
    </div>
    <footer class="sticky-footer">
      <button class="btn-continue" id="btnContinue">
        <i class="fa-solid fa-arrow-right btn-icon"></i>
      </button>
    </footer>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cards = document.querySelectorAll('.sub-card');
      const btn = document.getElementById('btnContinue');
      let selected = 'family_debt';
      cards.forEach(card => {
        card.addEventListener('click', () => selectCard(card));
        card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectCard(card); } });
      });
      function selectCard(card) { cards.forEach(c => c.classList.remove('selected')); card.classList.add('selected'); card.focus(); selected = card.dataset.value; }
      document.getElementById('backBtn').addEventListener('click', () => { window.location.href = 'expense.html'; });
      btn.addEventListener('click', () => { localStorage.setItem('expenseBack', 'expense.html'); localStorage.setItem('selectedSubCategory', selected); window.location.href = 'payment.html'; });
    });
  </script>
</body>
</html>
