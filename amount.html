<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F0EEFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>បញ្ចូលចំនួនទឹកប្រាក់</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Header */
    .header {
      padding: 48px 20px 0;
      text-align: center;
    }

    .header-title {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .header-sub {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-light);
      margin-top: 6px;
      line-height: 1.5;
    }

    /* Amount Section */
    .amount-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px;
    }

    .amount-input-wrap {
      width: 100%;
      max-width: 320px;
      position: relative;
    }

    .amount-currency {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      pointer-events: none;
    }

    .amount-input {
      width: 100%;
      height: 72px;
      padding: 0 20px 0 56px;
      font-family: var(--font);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
      background: var(--white);
      border: 3px solid var(--border);
      border-radius: var(--radius-lg);
      outline: none;
      text-align: left;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
      box-shadow: var(--shadow-sm);
      -moz-appearance: textfield;
    }

    .amount-input::-webkit-outer-spin-button,
    .amount-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .amount-input::placeholder {
      color: #CCC;
      font-weight: 400;
      font-size: 1.2rem;
    }

    .amount-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    /* Note */
    .amount-note {
      width: 100%;
      max-width: 320px;
      margin-top: 16px;
    }

    .amount-note textarea {
      width: 100%;
      min-height: 80px;
      padding: 14px 16px;
      font-family: var(--font);
      font-size: 0.9rem;
      color: var(--text);
      background: var(--white);
      border: 3px solid var(--border);
      border-radius: var(--radius-lg);
      outline: none;
      resize: vertical;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
      box-shadow: var(--shadow-sm);
    }

    .amount-note textarea::placeholder {
      color: #BBB;
      font-weight: 400;
    }

    .amount-note textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    @media (max-width: 390px) {
      .amount-input { height: 64px; font-size: 1.5rem; }
      .amount-currency { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <button class="back-btn" id="backBtn" aria-label="ត្រឡប់ក្រោយ"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="main">
    <!-- Header -->
    <div class="header">
    <h1 class="header-title">បញ្ចូលចំនួនទឹកប្រាក់</h1>
    <p class="header-sub">សូមបញ្ចូលចំនួនទឹកប្រាក់ដែលអ្នកចង់កត់ត្រា</p>
  </div>

  <!-- Amount Section -->
  <div class="amount-section">
    <div class="amount-input-wrap">
      <span class="amount-currency" id="currencySymbol">$</span>
      <input class="amount-input" id="amountInput" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="amount-note">
      <textarea id="noteInput" placeholder="បន្ថែមការពិពណ៌នា (មិនចាំបាច់)" rows="3"></textarea>
    </div>
  </div> <!-- /.amount-section -->
  </div> <!-- /.main -->

  <!-- Sticky Footer -->
  <footer class="sticky-footer">
    <button class="btn-continue" id="btnContinue" disabled>
      <i class="fa-solid fa-arrow-right btn-icon"></i>
    </button>
  </footer>

  <div id="statusOverlay" class="status-overlay">
    <div class="status-box">
      <div class="status-icon" id="statusIcon"><i class="fa-solid fa-check"></i></div>
      <div class="status-text" id="statusText">រក្សាទុកដោយជោគជ័យ</div>
    </div>
  </div>

  <script>
    // ── CONFIG ──
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyeZqRIvY-IlkhADZQJNwMf-NU87p4HoWqMqpaA9r6SXOTaqmsfdn0jSHTZofUb_a1v/exec';

    const CATEGORY_LABELS = {
      salary: 'ប្រាក់ខែ', weekly: 'សប្តាហ៍', additional: 'ចំណូលបន្ថែម',
      household: 'ចំណាយក្នុងផ្ទះ', children: 'ចំណាយសម្រាប់កូន',
      personal: 'ចំណាយផ្ទាល់ខ្លួន', business: 'ចំណាយអាជីវកម្ម',
      debt: 'បំណុល', irregular: 'ចំណាយមិនទៀងទាត់',
      travel: 'ការធ្វើដំណើរ និងយានយន្ត'
    };

    let submitting = false;

    document.addEventListener('DOMContentLoaded', () => {
      const symbol = document.getElementById('currencySymbol');
      const input = document.getElementById('amountInput');
      const btn = document.getElementById('btnContinue');
      const overlay = document.getElementById('statusOverlay');
      const currencies = { USD: { symbol: '$', placeholder: '0.00', step: '0.01' }, KHR: { symbol: '៛', placeholder: '0', step: '1' } };
      let currency = 'USD';

      try {
        const saved = JSON.parse(localStorage.getItem('selectedCurrency'));
        if (saved && saved.currency && currencies[saved.currency]) currency = saved.currency;
      } catch (_) {}

      const cfg = currencies[currency];
      symbol.textContent = cfg.symbol;
      input.placeholder = cfg.placeholder;
      input.step = cfg.step;

      input.addEventListener('input', () => {
        btn.disabled = !(parseFloat(input.value) > 0);
      });

      document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'currency.html';
      });

      btn.addEventListener('click', async () => {
        if (submitting) return;
        const val = parseFloat(input.value);
        if (!(val > 0)) return;

        submitting = true;
        btn.disabled = true;
        const origHTML = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> កំពុងរក្សាទុក...';

        // Collect all data
        const incomeType = localStorage.getItem('selectedIncomeType');
        const expenseType = localStorage.getItem('selectedExpenseType');
        const isIncome = !!incomeType;
        const payload = {
          requestId: Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8),
          type: isIncome ? 'income' : 'expense',
          category: isIncome ? incomeType : (expenseType || ''),
          categoryLabel: CATEGORY_LABELS[isIncome ? incomeType : (expenseType || '')] || '',
          subCategory: localStorage.getItem('selectedSubCategory') || '',
          payment: localStorage.getItem('selectedPayment') || '',
          currency: currency,
          amount: val,
          note: document.getElementById('noteInput').value.trim(),
          _savedAt: new Date().toISOString()
        };

        // Save locally (backup)
        const txnKey = 'txn_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
        localStorage.setItem(txnKey, JSON.stringify(payload));
        localStorage.setItem('lastTransaction', JSON.stringify(payload));

        // Send to Google Sheets (text/plain = no CORS preflight)
        try {
          const res = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload),
            redirect: 'follow'
          });
          // With no-cors we can't read response, but no throw = request sent
          markSynced(txnKey);
          showStatus(overlay, true, 'រក្សាទុកដោយជោគជ័យ');
        } catch (err) {
          // Network error — keep as pending for retry
          renamePending(txnKey);
          showStatus(overlay, false, 'រក្សាទុកក្នុងម៉ាស៊ីនរួច (គ្មានអ៊ីនធឺណិត)');
        }

        // Clear selections for next entry
        ['selectedIncomeType', 'selectedExpenseType', 'selectedSubCategory',
         'selectedPayment', 'selectedCurrency', 'enteredAmount'].forEach(
          k => localStorage.removeItem(k)
        );

        btn.innerHTML = origHTML;
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
      });
    });

    function markSynced(key) {
      try {
        const data = JSON.parse(localStorage.getItem(key) || '{}');
        data._synced = true;
        localStorage.setItem(key, JSON.stringify(data));
      } catch (_) {}
    }

    function renamePending(key) {
      try {
        const data = localStorage.getItem(key);
        if (data) {
          localStorage.removeItem(key);
          localStorage.setItem('pending_' + key.slice(4), data);
        }
      } catch (_) {}
    }

    function showStatus(overlay, success, text) {
      const icon = document.getElementById('statusIcon');
      const msg = document.getElementById('statusText');
      icon.innerHTML = success
        ? '<i class="fa-solid fa-check-circle" style="font-size:3rem;color:#fff;"></i>'
        : '<i class="fa-solid fa-exclamation-circle" style="font-size:3rem;color:#fff;"></i>';
      msg.textContent = text;
      overlay.style.background = success ? 'var(--color-primary)' : '#FF9800';
      overlay.style.display = 'flex';
      overlay.style.opacity = '0';
      requestAnimationFrame(() => { overlay.style.opacity = '1'; });
    }
  </script>
</body>
</html>
