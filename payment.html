<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F0EEFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>ជ្រើសរើសវិធីបង់ប្រាក់</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-bottom: 100px;
    }

    /* Header */
    .header {
      padding: 48px 20px 0;
      text-align: center;
    }

    .header-title {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .header-sub {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-light);
      margin-top: 6px;
      line-height: 1.5;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 28px 20px 12px;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Payment List */
    .payment-list {
      padding: 4px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .payment-card {
      background: var(--white);
      border: 3px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
      box-shadow: var(--shadow-sm);
      outline: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .payment-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .payment-card:active {
      transform: translateY(0) scale(0.98);
      box-shadow: var(--shadow-sm);
      transition-duration: 0.08s;
    }

    .payment-card:focus-visible {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .payment-card.selected {
      border-color: var(--primary);
      box-shadow: var(--shadow-selected);
      transform: translateY(-2px);
    }

    .payment-card.selected:active {
      transform: translateY(0) scale(0.98);
    }

    /* Payment Icon */
    .payment-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .payment-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: var(--radius-sm);
    }

    .payment-icon.cash {
      background: var(--white);
    }

    .payment-icon.aba {
      background: var(--white);
    }

    .payment-icon.acleda {
      background: var(--white);
    }

    /* Payment Info */
    .payment-info {
      flex: 1;
    }

    .payment-name {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .payment-desc {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-light);
      line-height: 1.4;
      margin-top: 2px;
    }

    /* Radio */
    .payment-radio {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 3px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.18s ease, background 0.18s ease;
    }

    .payment-card.selected .payment-radio {
      border-color: var(--primary);
      background: var(--primary);
    }

    .payment-radio-inner {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--white);
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .payment-card.selected .payment-radio-inner {
      opacity: 1;
    }

    @media (min-width: 640px) {
      .payment-list { max-width: 640px; margin: 0 auto; width: 100%; }
    }

    @media (max-width: 390px) {
      .payment-card { padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <button class="back-btn" id="backBtn" aria-label="ត្រឡប់ក្រោយ"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="main">
    <!-- Header -->
    <div class="header">
    <h1 class="header-title">ជ្រើសរើសវិធីបង់ប្រាក់</h1>
    <p class="header-sub">ជ្រើសរើសវិធីបង់ប្រាក់ដែលអ្នកចង់ប្រើ</p>
  </div>

  <!-- Divider -->
  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-label">វិធីបង់ប្រាក់</span>
    <div class="divider-line"></div>
  </div>

  <!-- Payment List -->
  <div class="payment-list">
    <div class="payment-card" tabindex="0" data-value="cash">
      <div class="payment-icon cash">
        <img loading="lazy" src="cash.png" alt="សាច់ប្រាក់">
      </div>
      <div class="payment-info">
        <div class="payment-name">សាច់ប្រាក់</div>
        <div class="payment-desc">បង់ប្រាក់ដោយផ្ទាល់</div>
      </div>
      <div class="payment-radio">
        <div class="payment-radio-inner"></div>
      </div>
    </div>

    <div class="payment-card" tabindex="0" data-value="aba">
      <div class="payment-icon aba">
        <img loading="lazy" src="aba.jpeg" alt="ABA Bank">
      </div>
      <div class="payment-info">
        <div class="payment-name">ABA Bank</div>
        <div class="payment-desc">ផ្ទេរប្រាក់តាម ABA</div>
      </div>
      <div class="payment-radio">
        <div class="payment-radio-inner"></div>
      </div>
    </div>

    <div class="payment-card" tabindex="0" data-value="acleda">
      <div class="payment-icon acleda">
        <img loading="lazy" src="acleda.png" alt="ACLEDA Bank">
      </div>
      <div class="payment-info">
        <div class="payment-name">ACLEDA Bank</div>
        <div class="payment-desc">ផ្ទេរប្រាក់តាម ACLEDA</div>
      </div>
      <div class="payment-radio">
        <div class="payment-radio-inner"></div>
      </div>
    </div>
  </div>
  </div>

  <!-- Sticky Footer -->
  <footer class="sticky-footer">
    <button class="btn-continue" id="btnContinue" disabled>
      <i class="fa-solid fa-arrow-right btn-icon"></i>
    </button>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cards = document.querySelectorAll('.payment-card');
      const btn = document.getElementById('btnContinue');
      let selected = null;

      cards.forEach(card => {
        card.addEventListener('click', () => selectCard(card));
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            selectCard(card);
          }
        });
      });

      function selectCard(card) {
        cards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        card.focus();
        selected = card.dataset.value;
        btn.disabled = false;
      }

      document.getElementById('backBtn').addEventListener('click', () => {
        const back = localStorage.getItem('expenseBack') || 'expense.html';
        window.location.href = back;
      });

      btn.addEventListener('click', () => {
        if (selected) {
          localStorage.setItem('selectedPayment', selected);
          window.location.href = 'currency.html';
        }
      });
    });
  </script>
</body>
</html>
