<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F0EEFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>ជ្រើសរើសរូបិយប័ណ្ណ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-bottom: 100px;
    }

    /* Currency Header */
    .currency-header {
      text-align: center;
      padding: 48px 20px 0;
    }

    .currency-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }

    .currency-header p {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-light);
      margin-top: 6px;
      line-height: 1.5;
    }

    /* Currency Cards */
    .currency-list {
      padding: 28px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    .currency-card {
      background: var(--white);
      border: 3px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
      box-shadow: var(--shadow-sm);
      outline: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      position: relative;
    }

    .currency-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .currency-card:active {
      transform: translateY(0) scale(0.98);
      box-shadow: var(--shadow-sm);
      transition-duration: 0.08s;
    }

    .currency-card:focus-visible {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .currency-card.selected {
      border-color: var(--primary);
      box-shadow: var(--shadow-selected);
      transform: translateY(-2px);
    }

    .currency-card.selected:active {
      transform: translateY(0) scale(0.98);
    }

    /* Currency icon */
    .currency-icon {
      width: 40px;
      height: 28px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .currency-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Currency info */
    .currency-info {
      flex: 1;
    }

    .currency-code {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .currency-name {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text-light);
      line-height: 1.4;
      margin-top: 2px;
    }

    /* Check badge */
    .currency-check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.18s ease, transform 0.18s ease;
      flex-shrink: 0;
    }

    .currency-card.selected .currency-check {
      opacity: 1;
      transform: scale(1);
    }

    .currency-check i {
      font-size: 14px;
      color: var(--white);
    }

    /* Tag */
    .currency-tag {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 4px;
    }

    @media (min-width: 640px) {
      .currency-list {
        flex-direction: row;
        max-width: 640px;
        margin: 0 auto;
        width: 100%;
        padding-left: 20px;
        padding-right: 20px;
      }

      .currency-card {
        flex: 1;
      }
    }

    @media (max-width: 390px) {
      html { font-size: 17px; }
      .currency-card { padding: 16px; }
      .currency-icon { width: 36px; height: 24px; }
    }

    @media (max-width: 360px) {
      html { font-size: 16px; }
    }
  </style>
</head>
<body>
  <button class="back-btn" id="backBtn" aria-label="ត្រឡប់ក្រោយ"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="main">
    <div class="currency-header">
    <h1>ជ្រើសរើសរូបិយប័ណ្ណ</h1>
    <p>ជ្រើសរើសរូបិយប័ណ្ណដែលអ្នកប្រើប្រាស់</p>
  </div>

  <!-- Currency Cards -->
  <div class="currency-list">
    <div class="currency-card" tabindex="0" data-currency="USD">
      <div class="currency-icon usd"> <img loading="lazy" src="images/flag-us.png" alt="USD"></div>
      <div class="currency-info">
        <div class="currency-code">USD</div>
        <div class="currency-name">ដុល្លារអាមេរិក</div>
        <span class="currency-tag">ពេញនិយម</span>
      </div>
      <div class="currency-check">
        <i class="fa-solid fa-check"></i>
      </div>
    </div>

    <div class="currency-card" tabindex="0" data-currency="KHR">
      <div class="currency-icon khr"> <img loading="lazy" src="images/flag-kh.png" alt="KHR"></div>
      <div class="currency-info">
        <div class="currency-code">KHR</div>
        <div class="currency-name">រៀលកម្ពុជា</div>
      </div>
      <div class="currency-check">
        <i class="fa-solid fa-check"></i>
      </div>
    </div>
  </div>
  </div>

  <!-- Sticky Continue -->
  <footer class="sticky-footer">
    <button class="btn-continue" id="btnContinue" disabled>
      <i class="fa-solid fa-arrow-right btn-icon"></i>
    </button>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cards = document.querySelectorAll('.currency-card');
      const btn = document.getElementById('btnContinue');
      let selected = null;

      cards.forEach(card => {
        card.addEventListener('click', () => selectCard(card));
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            selectCard(card);
          }
        });
      });

      function selectCard(card) {
        cards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        card.focus();
        selected = card.dataset.currency;
        btn.disabled = false;
      }

      document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'payment.html';
      });

      btn.addEventListener('click', () => {
        if (selected) {
          if (typeof localStorage !== 'undefined') {
            localStorage.setItem('selectedCurrency', JSON.stringify({ currency: selected }));
          }
          window.location.href = 'amount.html';
        }
      });
    });
  </script>
</body>
</html>
