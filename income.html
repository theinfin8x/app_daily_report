<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F0EEFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>ជ្រើសរើសចំណូល</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .page-income .container {
      padding-bottom: calc(var(--sticky-height) + env(safe-area-inset-bottom, 0px) + var(--spacing-lg));
      flex: 1;
    }

    /* === Income Cards === */
    .income-grid {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .income-card {
      background: var(--color-white);
      border: 3px solid var(--color-border);
      border-radius: var(--radius-card);
      padding: var(--spacing-sm);
      cursor: pointer;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
      box-shadow: var(--shadow-card);
      position: relative;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .income-card:hover {
      box-shadow: var(--shadow-card-hover);
      transform: translateY(-2px);
    }

    .income-card:active {
      transform: translateY(0) scale(0.98);
      box-shadow: var(--shadow-card);
      transition-duration: 0.08s;
    }

    .income-card:focus-visible {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-light);
    }

    .income-card.selected {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-card-selected);
      transform: translateY(-2px);
    }

    .income-card-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 12px;
      margin-bottom: var(--spacing-xs);
    }

    .income-card-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .income-card-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.5;
      padding: var(--spacing-xs) 0;
      text-align: center;
    }

    .income-card-check {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-white);
      opacity: 0;
      transform: scale(0);
      transition: opacity var(--transition-fast), transform var(--transition-fast);
      pointer-events: none;
      z-index: 1;
    }

    .income-card.selected .income-card-check {
      opacity: 1;
      transform: scale(1);
    }

    .income-card-check i {
      font-size: 14px;
      color: var(--color-white);
    }

    @media (min-width: 640px) {
      .income-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: var(--spacing-lg);
      }
    }

    @media (max-width: 360px) {
      .income-card-image {
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <button class="back-btn" id="backBtn" aria-label="ត្រឡប់ក្រោយ"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="page page-income active">
    <div class="container">
      <div class="income-grid">
        <div class="income-card selected" tabindex="0" data-value="salary">
          <span class="income-card-check"><i class="fa-solid fa-check"></i></span>
          <div class="income-card-image">
            <img src="images/sub/salary.png" alt="ប្រាក់ខែ" loading="lazy">
          </div>
          <p class="income-card-label">ប្រាក់ខែ</p>
        </div>

        <div class="income-card" tabindex="0" data-value="weekly">
          <span class="income-card-check"><i class="fa-solid fa-check"></i></span>
          <div class="income-card-image">
            <img src="images/sub/weekly.png" alt="សប្តាហ៍" loading="lazy">
          </div>
          <p class="income-card-label">សប្តាហ៍</p>
        </div>

        <div class="income-card" tabindex="0" data-value="additional">
          <span class="income-card-check"><i class="fa-solid fa-check"></i></span>
          <div class="income-card-image">
            <img src="images/sub/additional.png" alt="ចំណូលបន្ថែម" loading="lazy">
          </div>
          <p class="income-card-label">ចំណូលបន្ថែម</p>
        </div>
      </div>
    </div>

    <footer class="sticky-footer">
      <button class="btn-continue" id="btnContinue">
        <i class="fa-solid fa-arrow-right btn-icon"></i>
      </button>
    </footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cards = document.querySelectorAll('.income-card');
      const btn = document.getElementById('btnContinue');
      let selected = 'salary';

      cards.forEach(card => {
        card.addEventListener('click', () => selectCard(card));
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            selectCard(card);
          }
        });
      });

      function selectCard(card) {
        cards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        card.focus();
        selected = card.dataset.value;
      }

      document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'index.html';
      });

      btn.addEventListener('click', () => {
        localStorage.setItem('expenseBack', 'income.html');
        localStorage.setItem('selectedIncomeType', selected);
        window.location.href = 'payment.html';
      });
    });
  </script>
</body>
</html>
