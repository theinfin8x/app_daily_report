<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F0EEFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="manifest" href="manifest.json">
  <title>ជ្រើសរើសចំណូល</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="back-btn" id="backBtn" aria-label="ត្រឡប់ក្រោយ"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="page page-income active">
    <div class="container">
      <div class="income-grid">
        <div class="income-card selected" tabindex="0" data-value="salary">
          <span class="income-card-check"><i class="fa-solid fa-check"></i></span>
          <div class="income-card-image">
            <img src="images/sub/salary.jpg" alt="ប្រាក់ខែ" loading="lazy">
          </div>
          <p class="income-card-label">ប្រាក់ខែ</p>
        </div>

        <div class="income-card" tabindex="0" data-value="weekly">
          <span class="income-card-check"><i class="fa-solid fa-check"></i></span>
          <div class="income-card-image">
            <img src="images/sub/weekly.jpg" alt="សប្តាហ៍" loading="lazy">
          </div>
          <p class="income-card-label">សប្តាហ៍</p>
        </div>

        <div class="income-card" tabindex="0" data-value="additional">
          <span class="income-card-check"><i class="fa-solid fa-check"></i></span>
          <div class="income-card-image">
            <img src="images/sub/additional.jpg" alt="ចំណូលបន្ថែម" loading="lazy">
          </div>
          <p class="income-card-label">ចំណូលបន្ថែម</p>
        </div>
      </div>
    </div>

    <footer class="sticky-footer">
      <button class="btn-continue" id="btnContinue">
        <i class="fa-solid fa-arrow-right btn-icon"></i>
      </button>
    </footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cards = document.querySelectorAll('.income-card');
      const btn = document.getElementById('btnContinue');
      let selected = 'salary';

      cards.forEach(card => {
        card.addEventListener('click', () => selectCard(card));
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            selectCard(card);
          }
        });
      });

      function selectCard(card) {
        cards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        card.focus();
        selected = card.dataset.value;
      }

      document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'index.html';
      });

      btn.addEventListener('click', () => {
        localStorage.setItem('expenseBack', 'income.html');
        localStorage.setItem('selectedIncomeType', selected);
        window.location.href = 'payment.html';
      });
    });
  </script>
</body>
</html>
